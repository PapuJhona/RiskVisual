<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGS - Registro de Incidentes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="accidentes-style.css">
    <script src="db-manager.js"></script> 
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
</head>

<body style="display: none;">

    <header>
        <div class="brand">
            <a href="dashboard.html" class="back-link"><i class="fa-solid fa-house"></i> Dashboard</a>
            <span class="divider">|</span>
            <span style="font-weight:bold;">Registro de Incidentes y Accidentes</span>
        </div>
        <div class="actions">
            <div id="dynamic-actions">
                </div>
        </div>
    </header>

    <div class="nav-bar">
        <button id="btn-back" class="btn btn-back" onclick="navigateBack()" style="display:none;">
            <i class="fa-solid fa-arrow-left"></i> Atrás
        </button>
        <div id="breadcrumb" class="breadcrumb">Listado General</div>
    </div>

    <main class="main-wrapper">
        <div class="page-header">
            <h2 id="page-title">Cargando...</h2>
            <p id="page-subtitle">...</p>
        </div>

        <div id="main-area" class="content-grid fade-in"></div>
    </main>

    <footer class="summary-footer">
        <div class="summary-card">
            <div class="icon-circle" style="color:#3498db; background:rgba(52,152,219,0.2);"><i class="fa-solid fa-list-ol"></i></div>
            <div class="summary-info"><span id="count-total">0</span><small>TOTAL EVENTOS</small></div>
        </div>
        <div class="summary-card warning">
            <div class="icon-circle"><i class="fa-solid fa-triangle-exclamation"></i></div>
            <div class="summary-info"><span id="count-incidents">0</span><small>INCIDENTES (Casi Accidente)</small></div>
        </div>
        <div class="summary-card" style="color:#e74c3c;">
            <div class="icon-circle" style="color:#e74c3c; background:rgba(231,76,60,0.2);"><i class="fa-solid fa-truck-medical"></i></div>
            <div class="summary-info"><span id="count-accidents">0</span><small>ACCIDENTES</small></div>
        </div>
        <div class="summary-card success">
            <div class="icon-circle"><i class="fa-solid fa-folder-open"></i></div>
            <div class="summary-info"><span id="count-open">0</span><small>CASOS ABIERTOS</small></div>
        </div>
    </footer>

    <div id="appModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Título</h3>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div id="modal-body" class="modal-body"></div>
            <div class="modal-footer">
                <button onclick="closeModal()" class="btn btn-secondary">Cancelar</button>
                <button onclick="saveData()" class="btn btn-primary">Guardar Registro</button>
            </div>
        </div>
    </div>

    <div id="pdfModal" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header" style="background: #c0392b;">
                <h3><i class="fa-solid fa-file-pdf"></i> Generar Reporte FLASH</h3>
                <span class="close" onclick="closePdfModal()">&times;</span>
            </div>
            <div class="modal-body">
                <p style="color:#666; font-size:0.9rem; margin-bottom:15px;">Datos del responsable del reporte:</p>
                <div class="form-group">
                    <label>Reportado por:</label>
                    <input type="text" id="pdf-author" placeholder="Nombre del supervisor o prevencionista">
                </div>
                <div class="form-group">
                    <label>Cargo:</label>
                    <input type="text" id="pdf-role" placeholder="Ej: Jefe de SSOMA">
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="closePdfModal()" class="btn btn-secondary">Cancelar</button>
                <button onclick="generateReportPDF()" class="btn btn-primary" style="background:#e74c3c; border:none;">
                    <i class="fa-solid fa-file-export"></i> Descargar PDF
                </button>
            </div>
        </div>
    </div>

    <script src="accidentes-script.js"></script>
    <script>
        function verificarAcceso() {
            const session = JSON.parse(localStorage.getItem('SGS_CURRENT_SESSION'));
            if (!session || session.type !== 'COMPANY_USER') {
                document.body.style.display = 'flex'; // Cambiar por redirect en prod
            } else {
                document.body.style.display = 'flex'; 
            }
        }
        document.addEventListener('DOMContentLoaded', verificarAcceso);
        window.addEventListener('pageshow', (event) => {
            if (event.persisted) verificarAcceso();
        });
    </script>
</body>
</html>
